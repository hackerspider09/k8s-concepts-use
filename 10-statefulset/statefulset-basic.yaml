kind: StatefulSet
apiVersion: apps/v1

metadata:
  name: my-statefulset

spec:
  replicas: 3

  selector:
    matchLabels:
      app.kubernetes.io/name: django-app

  template:
    metadata:
      labels:
        app.kubernetes.io/name: django-app

    spec:
      containers:
      - name: django-app-container
        image: hackerspider09/python-rolling-app:v1
        imagePullPolicy: IfNotPresent  


#  Runs stateful apps where Pod identity matters.
# Pods get stable names ( app-0, app-1, app-2).
# Each Pod can have its own storage volume (persistent).