kind: ReplicaSet
apiVersion: apps/v1

metadata:
  name: my-replicaset

spec:
  replicas: 3
  selector:
    matchLabels:
      app: django-app

  template:
    metadata:
      name: django-app
      labels:
        app: django-app
    spec:
      containers:
      - name: django-app-container
        image: hackerspider09/python-rolling-app:v1
        imagePullPolicy: IfNotPresent  

# I updated the image of my ReplicaSet, but no pods changed.”
# ✅ That’s correct — ReplicaSet does not automatically update pods after a template change.
# You must manually delete the old pods so the ReplicaSet can recreate new ones using the updated image.

