
kind: Deployment 
apiVersion: apps/v1

metadata:
  name: my-deployment

spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: django-app

  template:
    metadata:
      labels:
        app.kubernetes.io/name: django-app

    spec:
      containers:
      - name: django-app-container
        image: hackerspider09/python-rolling-app:v1
        imagePullPolicy: IfNotPresent  


---
kind: Service
apiVersion: v1 
metadata:
  name: my-service

spec:
  selector:
    app.kubernetes.io/name: django-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000


# as this is work at cluster level only then how to access application
# 1. by proxy pass $kubectl port-forward svc/my-service 8080:80
# 2. by enter in control/worker plane cluster => get ip  of svc and curl (by this requests will routed to all instances)
