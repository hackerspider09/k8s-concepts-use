kind: Deployment
apiVersion: apps/v1

metadata:
  name: my-deployment

spec:
  replicas: 3
  selector:
    matchLabels: 
      app.kubernetes.io/name: django-app

  template:
    metadata:
      labels:
        app.kubernetes.io/name: django-app

    spec:
      containers:
        - name: django-app-container
          image: hackerspider09/python-rolling-app:v1
          imagePullPolicy: IfNotPresent

---

kind: Service
apiVersion: v1 
metadata:
  name: my-service

spec:
  selector:
    app.kubernetes.io/name: django-app
  
  type: NodePort

  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080

# from this method we can access application from one of the nodes ip and nodeport
# 1. get ip of control/worker plan and use nodePort to access app