
kind: Deployment 
apiVersion: apps/v1

metadata:
  name: my-deployment

spec:
  replicas: 3
  selector:
    matchLabels:
      app: django-app

  template:
    metadata:
      # its nothing but normal pod template 
      # name: django-app-pod 
      labels:
        app: django-app

    spec:
      containers:
      - name: django-app-container
        image: hackerspider09/python-rolling-app:v1
        imagePullPolicy: IfNotPresent  



# to see rolling update
# open antoher terminal with watch command to pods and change image of pods
# and watch  $kubectl rollout status deployment/my-deployment   to see rollout status