kind: DaemonSet
apiVersion: apps/v1

metadata:
  name: my-daemonset

spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: django-app

  template:
    metadata:
      labels:
        app.kubernetes.io/name: django-app

    spec:
      containers:
      - name: django-app-container
        image: hackerspider09/python-rolling-app:v1
        imagePullPolicy: IfNotPresent  

# Daemon set is useufll to run at least one pod in each node 